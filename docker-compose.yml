services:
  db:
    image: pgvector/pgvector:pg18
    container_name: voiceanalyzer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-voiceanalyzer}
      POSTGRES_USER: ${DB_USER:-voiceanalyzer}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1111}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-voiceanalyzer} -d ${DB_NAME:-voiceanalyzer}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voiceanalyzer-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-voiceanalyzer}
      DB_USER: ${DB_USER:-voiceanalyzer}
      DB_PASSWORD: ${DB_PASSWORD:-1111}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    volumes:
      - ./:/app
    command: ["python", "voice_match_bot.py"]

volumes:
  postgres_data:
